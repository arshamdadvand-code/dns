# ==============================================================================
# MasterDnsVPN Go Client Configuration
# Phase 1: measurement-first resolver profiling (authoritative derived runtime)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1) Tunnel Identity & Security
# ------------------------------------------------------------------------------
DOMAINS = ["1.7a8.ir"]

# 0=None 1=XOR 2=ChaCha20 3=AES-128-GCM 4=AES-192-GCM 5=AES-256-GCM
DATA_ENCRYPTION_METHOD = 1
ENCRYPTION_KEY = "bccff1164f48bbafcb811db1dd4f39a0"

# ------------------------------------------------------------------------------
# Phase-1: resolver profiling bootstrap
# ------------------------------------------------------------------------------
AUTO_PROFILE_RESOLVERS = true
RESOLVER_REGISTRY_FILE = "resolver_registry.json"
AUTO_PROFILE_WARM_MAX_AGE_SECONDS = 900.0
AUTO_PROFILE_WARM_MIN_VIABLE = 3

# ------------------------------------------------------------------------------
# 2) Local Proxy Listener
# ------------------------------------------------------------------------------
# "SOCKS5" or "TCP"
PROTOCOL_TYPE = "SOCKS5"
LISTEN_IP = "127.0.0.1"
LISTEN_PORT = 18000
SOCKS5_AUTH = false
SOCKS5_USER = "master_dns_vpn"
SOCKS5_PASS = "master_dns_vpn"

# ------------------------------------------------------------------------------
# 3) Local DNS Service
# ------------------------------------------------------------------------------
LOCAL_DNS_ENABLED = false
LOCAL_DNS_IP = "127.0.0.1"
LOCAL_DNS_PORT = 10808
LOCAL_DNS_CACHE_MAX_RECORDS = 20000
LOCAL_DNS_CACHE_TTL_SECONDS = 14400.0
LOCAL_DNS_PENDING_TIMEOUT_SECONDS = 60.0
DNS_RESPONSE_FRAGMENT_TIMEOUT_SECONDS = 30.0
LOCAL_DNS_CACHE_PERSIST_TO_FILE = true
LOCAL_DNS_CACHE_FLUSH_INTERVAL_SECONDS = 600.0

# ------------------------------------------------------------------------------
# 4) Resolver Selection, Duplication, and Health
# Note: Phase-1 derived runtime will override key knobs below.
# ------------------------------------------------------------------------------
# 0=RoundRobin 1=Random 2=RoundRobin 3=LeastLoss 4=LowestLatency
RESOLVER_BALANCING_STRATEGY = 3

PACKET_DUPLICATION_COUNT = 4
SETUP_PACKET_DUPLICATION_COUNT = 4
STREAM_RESOLVER_FAILOVER_RESEND_THRESHOLD = 5
STREAM_RESOLVER_FAILOVER_COOLDOWN = 15.0

RECHECK_INACTIVE_SERVERS_ENABLED = true
RECHECK_INACTIVE_INTERVAL_SECONDS = 60.0
RECHECK_SERVER_INTERVAL_SECONDS = 3.0
RECHECK_BATCH_SIZE = 10

AUTO_DISABLE_TIMEOUT_SERVERS = true
AUTO_DISABLE_TIMEOUT_WINDOW_SECONDS = 120.0
AUTO_DISABLE_MIN_OBSERVATIONS = 5
AUTO_DISABLE_CHECK_INTERVAL_SECONDS = 2.0

BASE_ENCODE_DATA = false

# ------------------------------------------------------------------------------
# 5) Compression
# ------------------------------------------------------------------------------
# 0=OFF 1=ZSTD 2=LZ4 3=ZLIB
UPLOAD_COMPRESSION_TYPE = 2
DOWNLOAD_COMPRESSION_TYPE = 2
COMPRESSION_MIN_SIZE = 120

# ------------------------------------------------------------------------------
# 6) MTU Discovery (used as profiling probe bounds / timeouts)
# ------------------------------------------------------------------------------
MIN_UPLOAD_MTU = 35
MIN_DOWNLOAD_MTU = 100
MAX_UPLOAD_MTU = 75
MAX_DOWNLOAD_MTU = 900
MTU_TEST_RETRIES = 5
MTU_TEST_TIMEOUT = 2.5
MTU_TEST_PARALLELISM = 1000

# ------------------------------------------------------------------------------
# 7) Runtime Workers, Queues, and Timers
# ------------------------------------------------------------------------------
RX_TX_WORKERS = 4
TUNNEL_PROCESS_WORKERS = 8
TUNNEL_PACKET_TIMEOUT_SECONDS = 20.0
DISPATCHER_IDLE_POLL_INTERVAL_SECONDS = 0.005

# ------------------------------------------------------------------------------
# 8) ARQ Reliability & Packing
# ------------------------------------------------------------------------------
MAX_PACKETS_PER_BATCH = 45
ARQ_WINDOW_SIZE = 600
ARQ_INITIAL_RTO_SECONDS = 0.1
ARQ_MAX_RTO_SECONDS = 1.0
ARQ_CONTROL_INITIAL_RTO_SECONDS = 0.2
ARQ_CONTROL_MAX_RTO_SECONDS = 1.0
ARQ_MAX_CONTROL_RETRIES = 20
ARQ_INACTIVITY_TIMEOUT_SECONDS = 600.0
ARQ_DATA_PACKET_TTL_SECONDS = 1800.0
ARQ_CONTROL_PACKET_TTL_SECONDS = 900.0
ARQ_MAX_DATA_RETRIES = 200
ARQ_DATA_NACK_MAX_GAP = 256
ARQ_DATA_NACK_INITIAL_DELAY_SECONDS = 0.1
ARQ_DATA_NACK_REPEAT_SECONDS = 0.1
ARQ_TERMINAL_DRAIN_TIMEOUT_SECONDS = 60.0
ARQ_TERMINAL_ACK_WAIT_TIMEOUT_SECONDS = 60.0

# ------------------------------------------------------------------------------
# 9) Logging
# ------------------------------------------------------------------------------
LOG_LEVEL = "INFO"
